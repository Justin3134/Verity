name: Augment Intelligence Review

# Triggers every time new intelligence files are committed to intelligence/live/
# (nexla_senso_update.py commits new articles on a schedule)
on:
  push:
    paths:
      - 'intelligence/live/**.md'
  schedule:
    # Runs every 15 minutes — matches Nexla feed update frequency
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch only, no Senso upload)'
        required: false
        default: 'false'

jobs:
  # ── Step 1: Fetch Nexla → save .md files ──────────────────────────────────
  ingest:
    name: Nexla Feed Ingest
    runs-on: ubuntu-latest
    outputs:
      new_files: ${{ steps.ingest.outputs.new_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install httpx python-dotenv tavily-python

      - name: Run Nexla ingest
        id: ingest
        env:
          NEXLA_API_URL: ${{ secrets.NEXLA_API_URL }}
          NEXLA_API_KEY: ${{ secrets.NEXLA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SENSO_API_KEY: ${{ secrets.SENSO_API_KEY }}
        run: |
          python scripts/nexla_senso_update.py --dry-run
          # Count new files
          NEW=$(git status --short intelligence/live/ | wc -l | tr -d ' ')
          echo "new_files=$NEW" >> $GITHUB_OUTPUT
          echo "New files: $NEW"

      - name: Commit new intelligence files
        run: |
          git config user.name "verity-bot"
          git config user.email "verity-bot@users.noreply.github.com"
          git add intelligence/live/
          git diff --cached --quiet || git commit -m "[nexla] Automated intelligence update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  # ── Step 2: Augment Code review of new intelligence ───────────────────────
  augment-review:
    name: Augment Intelligence Analysis
    runs-on: ubuntu-latest
    needs: ingest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Augment CLI
        run: npm install -g @augmentcode/auggie

      - name: Run Auggie intelligence review
        env:
          AUGMENT_SESSION_AUTH: ${{ secrets.AUGMENT_SESSION_AUTH }}
        run: |
          # Get list of new/modified intelligence files from last commit
          NEW_FILES=$(git diff HEAD~1 --name-only intelligence/live/ 2>/dev/null | head -20)

          if [ -z "$NEW_FILES" ]; then
            echo "No new intelligence files to review."
            exit 0
          fi

          echo "Reviewing new intelligence files:"
          echo "$NEW_FILES"

          # Build the file list for auggie
          FILE_CONTENTS=""
          for f in $NEW_FILES; do
            if [ -f "$f" ]; then
              FILE_CONTENTS="${FILE_CONTENTS}\n\n=== FILE: $f ===\n$(cat "$f" | head -100)"
            fi
          done

          # Run auggie review with intelligence rules
          auggie --print --quiet \
            --workspace-root . \
            "Review the following newly ingested intelligence reports from our Nexla/Tavily pipeline.
            Apply the intelligence review rules in .augment/rules/intelligence-review.md.
            Produce a structured batch review covering: source credibility, key claims,
            propaganda signals, intelligence priority ratings, and recommended watch signals.
            
            Files to review:
            $FILE_CONTENTS" > intelligence/reviews/$(date -u +%Y-%m-%d_%H-%M-%S)_review.md

          echo "Review complete."

      - name: Commit auggie review
        run: |
          git config user.name "augment-bot"
          git config user.email "augment-bot@users.noreply.github.com"
          git add intelligence/reviews/
          git diff --cached --quiet || git commit -m "[auggie] Intelligence review $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  # ── Step 3: Upload auggie-reviewed intelligence to Senso ──────────────────
  senso-upload:
    name: Upload to Senso Knowledge Base
    runs-on: ubuntu-latest
    needs: augment-review
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Senso CLI
        run: npm install -g @senso-ai/cli

      - name: Upload new intelligence + reviews to Senso
        env:
          SENSO_API_KEY: ${{ secrets.SENSO_API_KEY }}
        run: |
          # Upload any new intelligence files
          for f in $(git diff HEAD~3 --name-only intelligence/ 2>/dev/null); do
            if [ -f "$f" ] && [[ "$f" == *.md ]]; then
              echo "Uploading: $f"
              senso ingest upload "$f" || true
              sleep 1
            fi
          done
          echo "Senso upload complete."
